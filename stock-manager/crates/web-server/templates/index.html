{% extends "layout.html" %}

{% block title %}Stock Manager - Home{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="text-3xl font-bold mb-6">Welcome to Stock Manager</h1>
    <p class="mb-8">Manage your inventory with ease</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
        <a href="/products" class="bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition">
            <h2 class="text-xl font-bold mb-2">Products</h2>
            <p>Manage your product catalog</p>
        </a>
        <a href="/stock" class="bg-white p-6 rounded-lg shadow-md hover:shadow-lg transition">
            <h2 class="text-xl font-bold mb-2">Stock</h2>
            <p>Track inventory levels</p>
        </a>
    </div>
</div>
{% endblock %}
